<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yearly Wheel — Intellishore</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F4F1;
    --surface: #FFFFFF;
    --border: #E5E3DE;
    --text: #1A1A1A;
    --text2: #6B6560;
    --text3: #A09A93;
    --accent: #1A1A1A;

    /* Internal — Blues */
    --int-teambuilding: #14506A;
    --int-guild: #2874A6;
    --int-social: #5DADE2;
    --int-ring: rgba(20,80,106,0.06);

    /* External — Reds */
    --ext-webinars: #922B21;
    --ext-conferences: #C0392B;
    --ext-health: #E74C3C;
    --ext-ring: rgba(192,57,43,0.06);

    /* Marketing — Greens */
    --mkt-strategy: #0E4D3A;
    --mkt-ai: #1E8449;
    --mkt-ae: #27AE60;
    --mkt-ring: rgba(30,132,73,0.06);
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    padding: 18px 32px;
    background: var(--text);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .logo-sub {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
  }

  /* Time nav */
  .time-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 4px;
  }
  .time-nav button {
    width: 32px; height: 32px;
    border: none; background: transparent;
    color: rgba(255,255,255,0.7);
    font-size: 16px; cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .time-nav button:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .time-nav .period {
    padding: 4px 16px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    min-width: 140px;
    text-align: center;
  }
  .view-btns { display: flex; gap: 2px; margin-left: 8px; }
  .view-btns button {
    padding: 6px 14px; border: none; background: transparent;
    color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600;
    cursor: pointer; border-radius: 6px; font-family: inherit;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .view-btns button.active { background: rgba(255,255,255,0.15); color: #fff; }
  .view-btns button:hover { color: #fff; }

  /* Loading */
  .loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100;
    transition: opacity 0.3s;
  }
  .loading.out { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--text);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading .msg { font-size: 14px; font-weight: 600; color: var(--text2); }

  /* Upload bar */
  .upload-bar {
    padding: 10px 32px;
    background: #FFF8E1;
    border-bottom: 1px solid #FFE082;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 13px;
    color: #5D4037;
  }
  .upload-bar strong { font-weight: 600; }
  .file-btn {
    padding: 5px 12px;
    background: #fff;
    border: 1px solid #E0E0E0;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    color: var(--text2);
  }

  /* Main */
  .main { display: flex; height: calc(100vh - 56px); overflow: hidden; }

  /* Left sidebar — filters */
  .filters {
    width: 260px;
    padding: 24px 20px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .filter-section { margin-bottom: 24px; }
  .filter-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .main-cat {
    margin-bottom: 16px;
  }
  .main-cat-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .main-cat-header .indicator {
    width: 14px; height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .sub-cat-list { padding-left: 22px; }
  .sub-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    cursor: pointer;
    font-size: 12px;
  }
  .sub-box {
    width: 14px; height: 14px;
    border-radius: 3px;
    border: 2px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .sub-box .ck { color: #fff; font-size: 9px; font-weight: 700; }
  .sub-label { font-weight: 500; color: var(--text); }
  .sub-label.off { color: var(--text3); }
  .sub-count { margin-left: auto; font-size: 10px; color: var(--text3); font-weight: 600; }

  /* Wheel area */
  .wheel-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-width: 0;
    background: var(--bg);
  }
  #wsvg { width: 100%; max-width: 680px; height: auto; }

  /* Right sidebar — detail */
  .detail-panel {
    width: 300px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .detail-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-header .section-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text3);
  }
  .event-card {
    padding: 20px;
    flex: 1;
  }
  .event-card.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 13px;
    font-style: italic;
  }
  .ev-tags { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .ev-tag {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #fff;
  }
  .ev-tag.outline {
    color: var(--text2);
    background: transparent;
    border: 1px solid var(--border);
  }
  .ev-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; }
  .ev-date { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .ev-field { margin-bottom: 16px; }
  .ev-field-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text3); margin-bottom: 4px;
  }
  .ev-field-value { font-size: 13px; color: var(--text); line-height: 1.5; }
  .ev-field-value a { color: #2874A6; text-decoration: none; font-weight: 500; }
  .ev-field-value a:hover { text-decoration: underline; }

  /* Event list (below detail) */
  .event-list-container {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    overflow-y: auto;
    flex: 1;
  }
  .event-list-container .section-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--text3); margin-bottom: 10px;
  }
  .ev-list-item {
    padding: 8px 10px;
    margin-bottom: 2px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.12s;
    border: 1px solid transparent;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ev-list-item:hover { background: var(--bg); }
  .ev-list-item.sel { background: #F0F4F8; border-color: #CBD5E1; }
  .ev-list-item .dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .ev-list-item .info { flex: 1; min-width: 0; }
  .ev-list-item .nm { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ev-list-item .meta { font-size: 10px; color: var(--text3); margin-top: 1px; }

  /* Drop overlay */
  #drop-ov {
    display: none; position: fixed; inset: 0;
    background: rgba(26,26,26,0.08); z-index: 200;
    pointer-events: none; backdrop-filter: blur(2px);
  }
  #drop-ov > div {
    position: absolute; inset: 30px;
    border: 3px dashed var(--text3);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  #drop-ov .msg { font-size: 18px; font-weight: 700; color: var(--text2); }

  .hd { display: none !important; }

  /* Footer */
  .footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 8px 32px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    z-index: 10;
  }
  .footer .brand { font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .footer .tagline { font-style: italic; }

  @media (max-width: 1100px) {
    .main { flex-direction: column; height: auto; }
    .filters, .detail-panel { width: 100%; border: none; border-bottom: 1px solid var(--border); }
    .detail-panel { border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="loading" id="ld"><div class="spinner"></div><div class="msg">Loading events…</div></div>

<div class="hd" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div>
        <div class="logo">Intellishore</div>
      </div>
      <div class="logo-sub">Yearly Wheel</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="time-nav">
        <button onclick="prevPeriod()" title="Previous">◂</button>
        <div class="period" id="period-label"></div>
        <button onclick="nextPeriod()" title="Next">▸</button>
      </div>
      <div class="view-btns">
        <button class="active" id="btn-year" onclick="setView('year')">Year</button>
        <button id="btn-h1" onclick="setView('h1')">H1</button>
        <button id="btn-h2" onclick="setView('h2')">H2</button>
        <button id="btn-q1" onclick="setView('q1')">Q1</button>
        <button id="btn-q2" onclick="setView('q2')">Q2</button>
        <button id="btn-q3" onclick="setView('q3')">Q3</button>
        <button id="btn-q4" onclick="setView('q4')">Q4</button>
      </div>
    </div>
  </div>

  <!-- Upload bar -->
  <div class="upload-bar hd" id="ubar">
    <strong>📊 Sample data</strong>
    <span>Drop a CSV/Excel file or</span>
    <label class="file-btn">Choose File<input type="file" id="fi" accept=".xlsx,.xls,.csv" hidden></label>
    <span style="color:#8D6E63">Place <strong>events.csv</strong> alongside this file to auto-load.</span>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Filters -->
    <div class="filters">
      <div class="filter-section">
        <div class="filter-title">Categories</div>
        <div id="cat-filters"></div>
      </div>
    </div>

    <!-- Wheel -->
    <div class="wheel-area">
      <svg id="wsvg" viewBox="0 0 700 700"></svg>
    </div>

    <!-- Detail + List -->
    <div class="detail-panel">
      <div class="detail-header">
        <div class="section-label">Event Details</div>
      </div>
      <div id="ev-card" class="event-card empty">Click an event to view details</div>
      <div class="event-list-container">
        <div class="section-label" id="ev-list-title">Events (0)</div>
        <div id="ev-list"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span class="brand">Intellishore</span>
    <span class="tagline">Build for better lives</span>
    <span id="footer-date"></span>
  </div>
</div>

<div id="drop-ov"><div><span class="msg">Drop CSV or Excel file here</span></div></div>

<script>
/* ══ CONFIG ══ */
var CSV_FILE = "events.csv";

/* ══ Category / color schema ══ */
var SCHEMA = {
  "Internal": {
    color: "#14506A",
    ring: 0, /* inner */
    subs: {
      "Teambuilding Days": "#14506A",
      "Associate Guild":   "#2874A6",
      "Social Events":     "#5DADE2"
    }
  },
  "External": {
    color: "#C0392B",
    ring: 1, /* middle */
    subs: {
      "Webinars":    "#922B21",
      "Conferences": "#C0392B",
      "Health 3.0":  "#E74C3C"
    }
  },
  "Marketing": {
    color: "#1E8449",
    ring: 2, /* outer */
    subs: {
      "Strategy": "#0E4D3A",
      "AI":       "#1E8449",
      "AE":       "#27AE60"
    }
  }
};

var MAIN_CATS = Object.keys(SCHEMA);
var MO = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var MO_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ══ State ══ */
var allEv=[], activeSubs=new Set(), hovI=null, selI=null, useSample=false;
var viewYear=2026, viewMode="year"; // year, h1, h2, q1-q4

/* ══ Parsing ══ */
function pDate(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v)?null:v;
  var s=String(v).trim();
  var m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return new Date(+m[3],+m[1]-1,+m[2]);
  m=s.match(/^(\d{1,2})[\-.](\d{1,2})[\-.](\d{4})/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  var d=new Date(s);return isNaN(d)?null:d;
}
function fCol(keys,pats){for(var p=0;p<pats.length;p++){for(var k=0;k<keys.length;k++){if(pats[p].test(keys[k]))return keys[k];}}return null;}
function parseRows(raw){
  var rows=[];
  for(var i=0;i<raw.length;i++){
    var r=raw[i],keys=Object.keys(r);
    var dk=fCol(keys,[/^Date$/i,/date/i]);
    var nk=fCol(keys,[/^Title$/i,/^Name$/i,/title/i,/name/i]);
    var mk=fCol(keys,[/^MainCat/i,/^main/i,/^type$/i]);
    var sk=fCol(keys,[/^SubCat/i,/^sub/i,/^category$/i]);
    var xk=fCol(keys,[/^Desc/i,/desc/i]);
    var ok=fCol(keys,[/^Owner/i,/owner/i]);
    var lk=fCol(keys,[/^Link$/i,/^URL$/i,/link/i,/url/i]);
    var date=dk?pDate(r[dk]):null;
    if(!date)continue;
    rows.push({
      date:date,
      name:String(r[nk]||"").trim()||"(Untitled)",
      mainCat:String(r[mk]||"Internal").trim(),
      subCat:String(r[sk]||"Other").trim(),
      description:String(r[xk]||"").trim(),
      owner:String(r[ok]||"").trim(),
      link:String(r[lk]||"").trim()
    });
  }
  rows.sort(function(a,b){return a.date-b.date;});
  return rows;
}
function parseCSV(text){
  var lines=[],cur=[],field="",inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(inQ){if(c==='"'){if(i+1<text.length&&text[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=c;}
    else{if(c==='"')inQ=true;else if(c===','){cur.push(field.trim());field="";}else if(c==='\n'||c==='\r'){if(c==='\r'&&i+1<text.length&&text[i+1]==='\n')i++;cur.push(field.trim());if(cur.length>1||cur[0]!=="")lines.push(cur);cur=[];field="";}else field+=c;}
  }
  cur.push(field.trim());if(cur.length>1||cur[0]!=="")lines.push(cur);
  if(lines.length<2)return[];
  var h=lines[0],objs=[];
  for(var j=1;j<lines.length;j++){var o={};for(var k=0;k<h.length;k++)o[h[k]]=lines[j][k]||"";objs.push(o);}
  return objs;
}

/* ══ Helpers ══ */
function subColor(mainCat,subCat){
  var s=SCHEMA[mainCat];
  if(!s)return"#999";
  return s.subs[subCat]||s.color;
}
function getRing(mainCat){var s=SCHEMA[mainCat];return s?s.ring:0;}

function getViewRange(){
  var y=viewYear;
  switch(viewMode){
    case"h1":return[new Date(y,0,1),new Date(y,6,1)];
    case"h2":return[new Date(y,6,1),new Date(y+1,0,1)];
    case"q1":return[new Date(y,0,1),new Date(y,3,1)];
    case"q2":return[new Date(y,3,1),new Date(y,6,1)];
    case"q3":return[new Date(y,6,1),new Date(y,9,1)];
    case"q4":return[new Date(y,9,1),new Date(y+1,0,1)];
    default:return[new Date(y,0,1),new Date(y+1,0,1)];
  }
}
function getFiltered(){
  var range=getViewRange();
  return allEv.filter(function(e){
    return e.date>=range[0]&&e.date<range[1]&&activeSubs.has(e.mainCat+"::"+e.subCat);
  });
}

/* Geometry */
function dateToAngle(date){
  var range=getViewRange();
  var frac=(date-range[0])/(range[1]-range[0]);
  return frac*360-90;
}
function pol(cx,cy,r,dg){var rd=dg*Math.PI/180;return{x:cx+r*Math.cos(rd),y:cy+r*Math.sin(rd)};}
function arc(cx,cy,r,sa,ea){var s=pol(cx,cy,r,sa),e=pol(cx,cy,r,ea);return"M "+s.x+" "+s.y+" A "+r+" "+r+" 0 "+(ea-sa>180?1:0)+" 1 "+e.x+" "+e.y;}

/* ══ Apply ══ */
function apply(evts){
  allEv=evts;
  // Detect year from data
  if(evts.length>0)viewYear=evts[0].date.getFullYear();
  // Activate all subs
  activeSubs=new Set();
  for(var mc in SCHEMA){for(var sc in SCHEMA[mc].subs){activeSubs.add(mc+"::"+sc);}}
  // Also activate any subs in data not in schema
  for(var i=0;i<evts.length;i++){activeSubs.add(evts[i].mainCat+"::"+evts[i].subCat);}
  hovI=null;selI=null;
  document.getElementById("ld").classList.add("hd");
  document.getElementById("app").classList.remove("hd");
  if(useSample)document.getElementById("ubar").classList.remove("hd");
  render();
}

/* ══ File handling ══ */
function handleFile(file){
  var reader=new FileReader();
  if(/\.csv$/i.test(file.name)){
    reader.onload=function(e){var evts=parseRows(parseCSV(e.target.result));if(evts.length>0){useSample=false;document.getElementById("ubar").classList.add("hd");apply(evts);}};
    reader.readAsText(file);
  }else{
    reader.onload=function(e){var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});var ws=wb.Sheets[wb.SheetNames[0]];var evts=parseRows(XLSX.utils.sheet_to_json(ws));if(evts.length>0){useSample=false;document.getElementById("ubar").classList.add("hd");apply(evts);}};
    reader.readAsArrayBuffer(file);
  }
}

/* ══ Time nav ══ */
function updatePeriodLabel(){
  var lbl="";
  switch(viewMode){
    case"year":lbl=viewYear;break;
    case"h1":lbl="H1 "+viewYear;break;
    case"h2":lbl="H2 "+viewYear;break;
    case"q1":lbl="Q1 "+viewYear;break;
    case"q2":lbl="Q2 "+viewYear;break;
    case"q3":lbl="Q3 "+viewYear;break;
    case"q4":lbl="Q4 "+viewYear;break;
  }
  document.getElementById("period-label").textContent=lbl;
}
function setView(mode){
  viewMode=mode;
  document.querySelectorAll(".view-btns button").forEach(function(b){b.classList.remove("active");});
  document.getElementById("btn-"+mode).classList.add("active");
  selI=null;hovI=null;
  render();
}
function prevPeriod(){
  if(viewMode==="year")viewYear--;
  else if(viewMode==="h1"){viewMode="h2";viewYear--;}
  else if(viewMode==="h2"){viewMode="h1";}
  else{
    var qi=parseInt(viewMode[1]);
    if(qi===1){viewMode="q4";viewYear--;}
    else viewMode="q"+(qi-1);
  }
  document.querySelectorAll(".view-btns button").forEach(function(b){b.classList.remove("active");});
  document.getElementById("btn-"+viewMode).classList.add("active");
  selI=null;hovI=null;render();
}
function nextPeriod(){
  if(viewMode==="year")viewYear++;
  else if(viewMode==="h1"){viewMode="h2";}
  else if(viewMode==="h2"){viewMode="h1";viewYear++;}
  else{
    var qi=parseInt(viewMode[1]);
    if(qi===4){viewMode="q1";viewYear++;}
    else viewMode="q"+(qi+1);
  }
  document.querySelectorAll(".view-btns button").forEach(function(b){b.classList.remove("active");});
  document.getElementById("btn-"+viewMode).classList.add("active");
  selI=null;hovI=null;render();
}

/* ══ Render ══ */
function render(){
  updatePeriodLabel();
  var f=getFiltered();
  rCats();rWheel(f);rList(f);rDetail(f);
  document.getElementById("footer-date").textContent=MO_FULL[new Date().getMonth()]+" "+new Date().getFullYear();
}

function rCats(){
  var el=document.getElementById("cat-filters");el.innerHTML="";
  MAIN_CATS.forEach(function(mc){
    var s=SCHEMA[mc];
    var div=document.createElement("div");div.className="main-cat";
    // Header
    var hdr=document.createElement("div");hdr.className="main-cat-header";
    hdr.innerHTML='<div class="indicator" style="background:'+s.color+'"></div>'+mc;
    div.appendChild(hdr);
    // Subs
    var subDiv=document.createElement("div");subDiv.className="sub-cat-list";
    Object.keys(s.subs).forEach(function(sc){
      var key=mc+"::"+sc;
      var on=activeSubs.has(key);
      var col=s.subs[sc];
      var cnt=allEv.filter(function(e){return e.mainCat===mc&&e.subCat===sc;}).length;
      var item=document.createElement("div");item.className="sub-item";
      item.innerHTML='<div class="sub-box" style="border-color:'+col+';background:'+(on?col:"transparent")+'">'+(on?'<span class="ck">✓</span>':'')+'</div><span class="sub-label'+(on?'':' off')+'">'+sc+'</span><span class="sub-count">'+cnt+'</span>';
      item.onclick=(function(k){return function(){activeSubs.has(k)?activeSubs.delete(k):activeSubs.add(k);selI=null;render();};})(key);
      subDiv.appendChild(item);
    });
    div.appendChild(subDiv);
    el.appendChild(div);
  });
}

function rDetail(f){
  var el=document.getElementById("ev-card");
  if(selI===null||!f[selI]){el.className="event-card empty";el.innerHTML="Click an event to view details";return;}
  var ev=f[selI],col=subColor(ev.mainCat,ev.subCat);
  var ds=ev.date.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  var h='<div class="ev-tags"><div class="ev-tag" style="background:'+col+'">'+ev.subCat+'</div><div class="ev-tag outline">'+ev.mainCat+'</div></div>';
  h+='<div class="ev-title">'+ev.name+'</div>';
  h+='<div class="ev-date">'+ds+'</div>';
  if(ev.description){h+='<div class="ev-field"><div class="ev-field-label">Description</div><div class="ev-field-value">'+ev.description+'</div></div>';}
  if(ev.owner){h+='<div class="ev-field"><div class="ev-field-label">Owner</div><div class="ev-field-value">'+ev.owner+'</div></div>';}
  if(ev.link){h+='<div class="ev-field"><div class="ev-field-label">Link</div><div class="ev-field-value"><a href="'+ev.link+'" target="_blank">'+ev.link+'</a></div></div>';}

function rList(f){
  document.getElementById("ev-list-title").textContent="Events ("+f.length+")";
  var el=document.getElementById("ev-list");el.innerHTML="";
  for(var i=0;i<f.length;i++){
    var ev=f[i],col=subColor(ev.mainCat,ev.subCat);
    var d=document.createElement("div");d.className="ev-list-item"+(selI===i?" sel":"");
    d.innerHTML='<div class="dot" style="background:'+col+'"></div><div class="info"><div class="nm">'+ev.name+'</div><div class="meta">'+ev.date.toLocaleDateString("en-GB",{day:"numeric",month:"short"})+' · '+ev.subCat+'</div></div>';
    d.onmouseenter=(function(idx){return function(){hovI=idx;rWheel(getFiltered());};})(i);
    d.onmouseleave=function(){hovI=null;rWheel(getFiltered());};
    d.onclick=(function(idx){return function(){selI=selI===idx?null:idx;render();};})(i);
    el.appendChild(d);
  }
}

function rWheel(f){
  var svg=document.getElementById("wsvg");
  var S=700,cx=350,cy=350;

  /* Three rings — inner to outer */
  var ringDefs=[
    {r1:130,r2:205,cat:"Internal",fill:"var(--int-ring)"},
    {r1:210,r2:265,cat:"External",fill:"var(--ext-ring)"},
    {r1:270,r2:320,cat:"Marketing",fill:"var(--mkt-ring)"}
  ];
  var centerR=125;

  /* Determine month labels based on view */
  var range=getViewRange();
  var months=[];
  var d=new Date(range[0]);
  while(d<range[1]){months.push(new Date(d));d=new Date(d.getFullYear(),d.getMonth()+1,1);}
  var numSeg=months.length;

  var h='<defs>';
  h+='<filter id="gl"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  h+='<filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.12"/></filter>';
  h+='<radialGradient id="cg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FAFAF8"/><stop offset="100%" stop-color="#EEEDEA"/></radialGradient>';
  h+='</defs>';

  /* Background */
  h+='<circle cx="'+cx+'" cy="'+cy+'" r="328" fill="#EEEDEA"/>';

  /* Ring backgrounds */
  for(var ri=0;ri<ringDefs.length;ri++){
    var rd=ringDefs[ri];
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+rd.r2+'" fill="'+rd.fill+'" stroke="var(--border)" stroke-width="0.5"/>';
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+rd.r1+'" fill="var(--bg)" stroke="var(--border)" stroke-width="0.5"/>';
    /* Ring label */
    var labelR=(rd.r1+rd.r2)/2;
    var labelAngle=-90-3; /* just above 12 o'clock */
    var lp=pol(cx,cy,labelR,labelAngle);
  }

  /* Rebuild ring backgrounds as proper annular sectors */
  /* First draw filled annular rings */
  for(var ri=0;ri<ringDefs.length;ri++){
    var rd=ringDefs[ri];
    /* Draw annular ring */
    h+='<path d="M '+(cx)+' '+(cy-rd.r2)+' A '+rd.r2+' '+rd.r2+' 0 1 1 '+(cx-0.01)+' '+(cy-rd.r2)+' Z M '+(cx)+' '+(cy-rd.r1)+' A '+rd.r1+' '+rd.r1+' 0 1 0 '+(cx-0.01)+' '+(cy-rd.r1)+' Z" fill="'+rd.fill+'" fill-rule="evenodd"/>';
  }

  /* Month separators + labels */
  for(var mi=0;mi<numSeg;mi++){
    var segStart=(mi/numSeg)*360-90;
    var segEnd=((mi+1)/numSeg)*360-90;
    var midA=(segStart+segEnd)/2;

    /* Separator line across all rings */
    var lineStart=pol(cx,cy,centerR,segStart);
    var lineEnd=pol(cx,cy,ringDefs[2].r2+2,segStart);
    h+='<line x1="'+lineStart.x+'" y1="'+lineStart.y+'" x2="'+lineEnd.x+'" y2="'+lineEnd.y+'" stroke="var(--border)" stroke-width="0.8"/>';

    /* Month label outside */
    var lp=pol(cx,cy,ringDefs[2].r2+16,midA);
    var moIdx=months[mi].getMonth();
    h+='<text x="'+lp.x+'" y="'+lp.y+'" text-anchor="middle" dominant-baseline="middle" style="font-size:10px;font-family:Outfit,sans-serif;font-weight:700;fill:var(--text3);letter-spacing:0.06em;text-transform:uppercase">'+MO[moIdx]+'</text>';
  }

  /* Center circle */
  h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+centerR+'" fill="url(#cg)" stroke="var(--border)" stroke-width="0.8"/>';

  /* Center text */
  var periodTxt="";
  switch(viewMode){
    case"year":periodTxt=viewYear;break;
    case"h1":periodTxt="H1 "+viewYear;break;
    case"h2":periodTxt="H2 "+viewYear;break;
    default:periodTxt=viewMode.toUpperCase()+" "+viewYear;
  }
  h+='<text x="'+cx+'" y="'+(cy-18)+'" text-anchor="middle" dominant-baseline="middle" style="font-size:26px;font-family:Outfit,sans-serif;font-weight:800;fill:var(--text);letter-spacing:-0.03em">'+periodTxt+'</text>';
  h+='<text x="'+cx+'" y="'+(cy+8)+'" text-anchor="middle" dominant-baseline="middle" style="font-size:10px;font-family:Outfit,sans-serif;font-weight:600;fill:var(--text3);letter-spacing:0.1em;text-transform:uppercase">Yearly Wheel</text>';
  h+='<text x="'+cx+'" y="'+(cy+24)+'" text-anchor="middle" dominant-baseline="middle" style="font-size:11px;font-family:Outfit,sans-serif;fill:var(--text3)">'+f.length+' events</text>';

  /* Ring labels in center area */
  var ringLabY = cy + 48;
  for(var ri=0;ri<ringDefs.length;ri++){
    var rd=ringDefs[ri];
    var col=SCHEMA[rd.cat].color;
    var lx = cx - 60 + ri*60;
    h+='<circle cx="'+lx+'" cy="'+ringLabY+'" r="4" fill="'+col+'"/>';
    h+='<text x="'+(lx+8)+'" y="'+ringLabY+'" text-anchor="start" dominant-baseline="middle" style="font-size:9px;font-family:Outfit,sans-serif;font-weight:600;fill:var(--text3)">'+rd.cat.substring(0,3).toUpperCase()+'</text>';
  }

  /* Events — place in correct ring */
  var eventsByRing=[[],[],[]];
  for(var i=0;i<f.length;i++){
    var ev=f[i];
    var ring=getRing(ev.mainCat);
    eventsByRing[ring].push({idx:i,ev:ev,angle:dateToAngle(ev.date)});
  }

  /* Position with collision avoidance per ring */
  var allPos=[];
  for(var ri=0;ri<3;ri++){
    var rd=ringDefs[ri];
    var evts=eventsByRing[ri];
    evts.sort(function(a,b){return a.angle-b.angle;});
    var subRings=[];
    var numSub=3;
    var step=(rd.r2-rd.r1-8)/(numSub);
    for(var si=0;si<numSub;si++){subRings.push(rd.r1+6+step*si+step/2);}

    var placed=[];
    for(var j=0;j<evts.length;j++){
      var ev=evts[j];
      var best=0;
      for(var si=0;si<subRings.length;si++){
        var ok=true;
        for(var p=0;p<placed.length;p++){
          if(placed[p].sr===si&&Math.abs(placed[p].angle-ev.angle)<(360/numSeg*0.35)){ok=false;break;}
        }
        if(ok){best=si;break;}
        best=si;
      }
      var pos={idx:ev.idx,ev:ev.ev,angle:ev.angle,radius:subRings[best],sr:best};
      placed.push(pos);
      allPos.push(pos);
    }
  }

  /* Draw events */
  for(var i=0;i<allPos.length;i++){
    var item=allPos[i];
    var p=pol(cx,cy,item.radius,item.angle);
    var col=subColor(item.ev.mainCat,item.ev.subCat);
    var act=hovI===item.idx||selI===item.idx;
    var ds=act?7:5;
    var flt=act?"url(#gl)":"url(#sh)";

    h+='<g data-i="'+item.idx+'" class="ev" style="cursor:pointer">';
    h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="14" fill="transparent"/>';
    h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="'+ds+'" fill="'+col+'" stroke="#fff" stroke-width="1.5" filter="'+flt+'"/>';
    if(act){
      var tw=item.ev.name.length*5.8+20;
      var tx=p.x+12,ty=p.y;
      /* Check if label would go offscreen */
      if(tx+tw>S-10){tx=p.x-tw-8;}
      h+='<rect x="'+tx+'" y="'+(ty-11)+'" width="'+tw+'" height="22" rx="4" fill="var(--text)" opacity="0.92"/>';
      h+='<text x="'+(tx+10)+'" y="'+(ty+1)+'" style="font-size:10px;font-family:Outfit,sans-serif;fill:#fff;font-weight:600">'+item.ev.name+'</text>';
    }
    h+='</g>';
  }

  svg.innerHTML=h;

  /* Attach listeners */
  var dots=svg.querySelectorAll(".ev");
  for(var j=0;j<dots.length;j++){
    (function(g){
      var idx=parseInt(g.getAttribute("data-i"));
      g.addEventListener("mouseenter",function(){hovI=idx;rWheel(getFiltered());});
      g.addEventListener("mouseleave",function(){hovI=null;rWheel(getFiltered());});
      g.addEventListener("click",function(){selI=selI===idx?null:idx;render();});
    })(dots[j]);
  }
}

function resetF(){
  activeSubs=new Set();
  for(var mc in SCHEMA){for(var sc in SCHEMA[mc].subs){activeSubs.add(mc+"::"+sc);}}
  selI=null;render();
}

  if(xhr.readyState!==4)return;
  if(xhr.status>=200&&xhr.status<300&&xhr.responseText&&xhr.responseText.length>10){

};
