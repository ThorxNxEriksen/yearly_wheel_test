<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yearly Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%); color: #1e293b; min-height: 100vh; }

  .header { padding: 20px 28px; border-bottom: 1px solid #e2e8f0; background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .header .dot { color: #2563eb; }
  .header .sub { font-size: 13px; color: #64748b; margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn { padding: 9px 18px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .btn-s { background: #fff; color: #475569; border: 1px solid #e2e8f0; }
  .btn-s:hover { background: #f8fafc; }

  /* Loading */
  .ld { position: fixed; inset: 0; background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.3s; }
  .ld.out { opacity: 0; pointer-events: none; }
  .sp { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ld .m { font-size: 15px; font-weight: 600; color: #475569; }
  .ld .s { font-size: 13px; color: #94a3b8; margin-top: 6px; }

  /* Upload banner */
  .upload-bar { padding: 10px 28px; background: #fffbeb; border-bottom: 1px solid #fde68a; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 13px; color: #92400e; }
  .upload-bar .lbl { font-weight: 600; }
  .upload-bar .filebtn { padding: 6px 14px; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600; color: #475569; }
  .upload-bar .filebtn:hover { background: #f8fafc; }

  /* Main layout */
  .ml { display: flex; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 85px); }
  .sb { width: 250px; padding: 24px 20px; border-right: 1px solid #e2e8f0; background: rgba(255,255,255,0.6); overflow-y: auto; flex-shrink: 0; }
  .sr { width: 270px; padding: 24px 20px; border-left: 1px solid #e2e8f0; background: rgba(255,255,255,0.6); overflow-y: auto; flex-shrink: 0; }
  .wa { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; min-width: 0; }
  .st { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94a3b8; margin-bottom: 10px; }
  .qa { margin-bottom: 8px; }
  .qa button { font-size: 11px; background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; margin-right: 10px; }
  .qa .a { color: #2563eb; }
  .qa .n { color: #94a3b8; }

  .ci { display: flex; align-items: center; gap: 8px; padding: 6px 0; cursor: pointer; font-size: 13px; }
  .cb { width: 18px; height: 18px; border-radius: 4px; border: 2px solid; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .cb .ck { color: #fff; font-size: 11px; font-weight: 700; }
  .cl { font-weight: 500; }
  .cl.off { color: #94a3b8; }
  .cc { margin-left: auto; font-size: 11px; color: #94a3b8; }

  .lg { border-top: 1px solid #e2e8f0; padding-top: 16px; margin-top: 8px; font-size: 12px; color: #64748b; line-height: 1.8; }

  .ed { margin-top: 16px; padding: 16px; background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; }
  .ed .tg { display: inline-block; padding: 2px 8px; border-radius: 4px; color: #fff; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .ed h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .ed .mt { font-size: 12px; color: #64748b; margin-bottom: 8px; }
  .ed .ds { font-size: 12px; color: #475569; line-height: 1.5; }

  .ei { padding: 10px 12px; margin-bottom: 4px; border-radius: 8px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; }
  .ei:hover { background: #f8fafc; }
  .ei.sel { background: #eff6ff; border-color: #bfdbfe; }
  .ei .rw { display: flex; align-items: center; gap: 8px; }
  .ei .dt { width: 8px; height: 8px; flex-shrink: 0; }
  .ei .dt.int { border-radius: 50%; }
  .ei .dt.ext { border-radius: 0; transform: rotate(45deg); }
  .ei .nm { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ei .inf { font-size: 11px; color: #94a3b8; margin-top: 2px; padding-left: 16px; }

  #wsvg { width: 100%; max-width: 700px; height: auto; }
  .hd { display: none !important; }

  @media (max-width: 1000px) {
    .ml { flex-direction: column; }
    .sb, .sr { width: 100%; border: none; border-bottom: 1px solid #e2e8f0; }
    .sr { border-bottom: none; border-top: 1px solid #e2e8f0; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="ld" id="ld">
  <div class="sp"></div>
  <div class="m">Loading events…</div>
  <div class="s" id="ld-s"></div>
</div>

<!-- Header -->
<div class="header hd" id="hdr">
  <div>
    <h1><span class="dot">●</span> Yearly Wheel</h1>
    <p class="sub" id="sub"></p>
  </div>
  <div class="header-actions">
    <button class="btn btn-s" onclick="resetF()">Reset Filters</button>
  </div>
</div>

<!-- Upload bar (shown when using sample data) -->
<div class="upload-bar hd" id="ubar">
  <span class="lbl">📊 Upload your data:</span>
  <span>Export your SharePoint list to CSV and drop it here, or</span>
  <label class="filebtn">
    Choose File
    <input type="file" id="fi" accept=".xlsx,.xls,.csv" hidden>
  </label>
  <span style="color:#b45309;">Place an <strong>events.csv</strong> in the same folder as this file to auto-load.</span>
</div>

<!-- Drop overlay -->
<div id="drop-ov" style="display:none;position:fixed;inset:0;background:rgba(37,99,235,0.12);z-index:200;pointer-events:none;backdrop-filter:blur(2px);">
  <div style="position:absolute;inset:40px;border:3px dashed #2563eb;border-radius:20px;display:flex;align-items:center;justify-content:center;">
    <div style="font-size:20px;font-weight:700;color:#2563eb;">Drop CSV or Excel file here</div>
  </div>
</div>

<!-- Main -->
<div class="ml hd" id="mv">
  <div class="sb">
    <div style="margin-bottom:24px">
      <div class="st">Categories</div>
      <div class="qa"><button class="a" onclick="selA()">All</button><button class="n" onclick="selN()">None</button></div>
      <div id="cf"></div>
    </div>
    <div style="margin-bottom:24px">
      <div class="st">Type</div>
      <div id="tf"></div>
    </div>
    <div class="lg">
      <div class="st">Legend</div>
      <div>● Circle = Internal</div>
      <div>▲ Triangle = External</div>
    </div>
    <div id="evd"></div>
  </div>
  <div class="wa"><svg id="wsvg" viewBox="0 0 700 700"></svg></div>
  <div class="sr">
    <div class="st" id="elt">Events (0)</div>
    <div id="el"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   CONFIG: Name of the CSV file to auto-load.
   Place this file next to the HTML file.
   Export from SharePoint: List toolbar → Export → CSV
   ══════════════════════════════════════════════ */
var CSV_FILE = "events.csv";

/* ── State ── */
var allEv=[], allCats=[], aCats, aTypes, hovI=null, selI=null, useSample=false;
var COLORS=["#2563eb","#dc2626","#16a34a","#ea580c","#7c3aed","#0891b2","#ca8a04","#be185d","#4f46e5","#059669","#d97706","#9333ea","#0d9488","#e11d48","#6d28d9"];
var MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

var SAMPLE=[
  {date:new Date(2026,0,15),name:"Kickoff Meeting",category:"Strategy",type:"Internal",description:"Annual strategy kickoff for all departments"},
  {date:new Date(2026,1,1),name:"Q1 Budget Review",category:"Finance",type:"Internal",description:"Quarterly budget review with finance team"},
  {date:new Date(2026,1,14),name:"Industry Conference",category:"Marketing",type:"External",description:"Annual industry conference and networking"},
  {date:new Date(2026,2,10),name:"Product Launch v2.0",category:"Product",type:"External",description:"Major product release to customers"},
  {date:new Date(2026,2,22),name:"Team Building Day",category:"HR",type:"Internal",description:"Company-wide team building activities"},
  {date:new Date(2026,3,5),name:"Board Meeting Q1",category:"Strategy",type:"Internal",description:"Q1 board of directors meeting"},
  {date:new Date(2026,3,18),name:"Partner Summit",category:"Sales",type:"External",description:"Annual partner summit and awards"},
  {date:new Date(2026,4,1),name:"Hackathon",category:"Engineering",type:"Internal",description:"48-hour innovation hackathon"},
  {date:new Date(2026,4,20),name:"Trade Show Berlin",category:"Marketing",type:"External",description:"European trade show exhibition"},
  {date:new Date(2026,5,15),name:"Mid-Year Review",category:"HR",type:"Internal",description:"Mid-year performance reviews"},
  {date:new Date(2026,5,28),name:"Customer Day",category:"Sales",type:"External",description:"Annual customer appreciation event"},
  {date:new Date(2026,6,4),name:"Summer Party",category:"HR",type:"Internal",description:"Annual summer celebration"},
  {date:new Date(2026,6,19),name:"Security Audit",category:"Engineering",type:"Internal",description:"Annual security compliance audit"},
  {date:new Date(2026,7,10),name:"Q3 Planning",category:"Strategy",type:"Internal",description:"Q3 strategic planning sessions"},
  {date:new Date(2026,7,25),name:"Webinar Series",category:"Marketing",type:"External",description:"Public webinar series launch"},
  {date:new Date(2026,8,5),name:"All Hands",category:"Strategy",type:"Internal",description:"Company all-hands meeting"},
  {date:new Date(2026,8,18),name:"Product Conf",category:"Product",type:"External",description:"Annual product conference"},
  {date:new Date(2026,9,1),name:"Q4 Budget",category:"Finance",type:"Internal",description:"Q4 budget planning and allocation"},
  {date:new Date(2026,9,15),name:"Charity Gala",category:"HR",type:"External",description:"Annual corporate charity gala"},
  {date:new Date(2026,10,1),name:"Black Friday Prep",category:"Sales",type:"Internal",description:"Preparation for holiday sales"},
  {date:new Date(2026,10,20),name:"Tech Summit",category:"Engineering",type:"External",description:"Technology leadership summit"},
  {date:new Date(2026,11,5),name:"Board Meeting Q4",category:"Strategy",type:"Internal",description:"Q4 board of directors meeting"},
  {date:new Date(2026,11,18),name:"Holiday Party",category:"HR",type:"Internal",description:"Annual holiday celebration"}
];

/* ── Parsing ── */
function pDate(v){
  if(!v)return null;
  if(v instanceof Date)return isNaN(v)?null:v;
  var s=String(v).trim();
  var m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m)return new Date(+m[1],+m[2]-1,+m[3]);
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m)return new Date(+m[3],+m[1]-1,+m[2]);
  m=s.match(/^(\d{1,2})[\-.](\d{1,2})[\-.](\d{4})/);
  if(m)return new Date(+m[3],+m[2]-1,+m[1]);
  var d=new Date(s);
  return isNaN(d)?null:d;
}
function fCol(keys,pats){for(var p=0;p<pats.length;p++){for(var k=0;k<keys.length;k++){if(pats[p].test(keys[k]))return keys[k];}}return null;}

function parseRows(raw){
  var rows=[];
  for(var i=0;i<raw.length;i++){
    var r=raw[i],keys=Object.keys(r);
    var dk=fCol(keys,[/^Date$/i,/^date/i,/date/i]);
    var nk=fCol(keys,[/^Title$/i,/^Name$/i,/^Event$/i,/title/i,/name/i,/event/i]);
    var ck=fCol(keys,[/^Category$/i,/^cat/i,/cat/i]);
    var tk=fCol(keys,[/^type$/i,/^Type$/i,/type/i,/scope/i]);
    var xk=fCol(keys,[/^Description$/i,/^desc/i,/desc/i]);
    var date=dk?pDate(r[dk]):null;
    if(!date)continue;
    rows.push({date:date,name:String(r[nk]||"").trim()||"(Untitled)",category:String(r[ck]||"Other").trim(),type:String(r[tk]||"").trim(),description:String(r[xk]||"").trim()});
  }
  rows.sort(function(a,b){return a.date-b.date;});
  return rows;
}

function parseCSV(text){
  // Handle quoted fields properly
  var lines=[];
  var current=[];
  var field="";
  var inQuotes=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(inQuotes){
      if(c==='"'){
        if(i+1<text.length&&text[i+1]==='"'){field+='"';i++;}
        else inQuotes=false;
      } else field+=c;
    } else {
      if(c==='"')inQuotes=true;
      else if(c===','){current.push(field.trim());field="";}
      else if(c==='\n'||c==='\r'){
        if(c==='\r'&&i+1<text.length&&text[i+1]==='\n')i++;
        current.push(field.trim());
        if(current.length>1||current[0]!=="")lines.push(current);
        current=[];field="";
      } else field+=c;
    }
  }
  current.push(field.trim());
  if(current.length>1||current[0]!=="")lines.push(current);

  if(lines.length<2)return[];
  var h=lines[0];
  var objs=[];
  for(var j=1;j<lines.length;j++){
    var o={};
    for(var k=0;k<h.length;k++)o[h[k]]=lines[j][k]||"";
    objs.push(o);
  }
  return objs;
}

/* ── Helpers ── */
function cCol(cat){var i=allCats.indexOf(cat);return COLORS[i>=0?i%COLORS.length:0];}
function isE(t){return/ext/i.test(t);}
function getF(){return allEv.filter(function(e){return aCats.has(e.category)&&((aTypes.has("Internal")&&!isE(e.type))||(aTypes.has("External")&&isE(e.type)));});}
function d2a(d){var s=new Date(d.getFullYear(),0,1),e=new Date(d.getFullYear()+1,0,1);return((d-s)/(e-s))*360-90;}
function pol(cx,cy,r,dg){var rd=dg*Math.PI/180;return{x:cx+r*Math.cos(rd),y:cy+r*Math.sin(rd)};}
function arc(cx,cy,r,sa,ea){var s=pol(cx,cy,r,sa),e=pol(cx,cy,r,ea);return"M "+s.x+" "+s.y+" A "+r+" "+r+" 0 "+(ea-sa>180?1:0)+" 1 "+e.x+" "+e.y;}

/* ── Apply ── */
function apply(evts){
  allEv=evts;allCats=[];var seen={};
  for(var i=0;i<evts.length;i++){if(!seen[evts[i].category]){allCats.push(evts[i].category);seen[evts[i].category]=true;}}
  aCats=new Set(allCats);aTypes=new Set(["Internal","External"]);hovI=null;selI=null;
  document.getElementById("ld").classList.add("out");
  setTimeout(function(){document.getElementById("ld").classList.add("hd");},300);
  document.getElementById("hdr").classList.remove("hd");
  document.getElementById("mv").classList.remove("hd");
  if(useSample)document.getElementById("ubar").classList.remove("hd");
  render();
}

/* ── File handling ── */
function handleFile(file){
  var reader=new FileReader();
  if(/\.csv$/i.test(file.name)){
    reader.onload=function(e){
      var objs=parseCSV(e.target.result);
      var evts=parseRows(objs);
      if(evts.length>0){useSample=false;document.getElementById("ubar").classList.add("hd");apply(evts);}
    };
    reader.readAsText(file);
  } else {
    reader.onload=function(e){
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var evts=parseRows(XLSX.utils.sheet_to_json(ws));
      if(evts.length>0){useSample=false;document.getElementById("ubar").classList.add("hd");apply(evts);}
    };
    reader.readAsArrayBuffer(file);
  }
}

/* ── Render ── */
function render(){
  var f=getF();
  document.getElementById("sub").textContent=f.length+" of "+allEv.length+" events"+(useSample?" (sample data)":"");
  rCats();rTypes();rWheel(f);rList(f);rDet(f);
}

function rCats(){
  var el=document.getElementById("cf");el.innerHTML="";
  for(var i=0;i<allCats.length;i++){
    var c=allCats[i],on=aCats.has(c),col=cCol(c);
    var cnt=allEv.filter(function(e){return e.category===c;}).length;
    var d=document.createElement("div");d.className="ci";
    d.innerHTML='<div class="cb" style="border-color:'+col+';background:'+(on?col:"transparent")+'">'+(on?'<span class="ck">✓</span>':'')+'</div><span class="cl'+(on?'':' off')+'">'+c+'</span><span class="cc">'+cnt+'</span>';
    d.onclick=(function(cat){return function(){aCats.has(cat)?aCats.delete(cat):aCats.add(cat);selI=null;render();};})(c);
    el.appendChild(d);
  }
}
function rTypes(){
  var el=document.getElementById("tf");el.innerHTML="";
  ["Internal","External"].forEach(function(t){
    var on=aTypes.has(t);
    var d=document.createElement("div");d.className="ci";
    d.innerHTML='<div class="cb" style="border-color:#64748b;background:'+(on?"#64748b":"transparent")+'">'+(on?'<span class="ck">✓</span>':'')+'</div><span class="cl'+(on?'':' off')+'">'+(t==="Internal"?"● Internal":"▲ External")+'</span>';
    d.onclick=(function(tp){return function(){aTypes.has(tp)?aTypes.delete(tp):aTypes.add(tp);selI=null;render();};})(t);
    el.appendChild(d);
  });
}
function rDet(f){
  var el=document.getElementById("evd");
  if(selI===null||!f[selI]){el.innerHTML="";return;}
  var ev=f[selI],col=cCol(ev.category);
  var ds=ev.date.toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  el.innerHTML='<div class="ed"><div class="tg" style="background:'+col+'">'+ev.category+'</div><h4>'+ev.name+'</h4><div class="mt">'+ds+' · '+ev.type+'</div>'+(ev.description?'<div class="ds">'+ev.description+'</div>':'')+'</div>';
}
function rList(f){
  document.getElementById("elt").textContent="Events ("+f.length+")";
  var el=document.getElementById("el");el.innerHTML="";
  for(var i=0;i<f.length;i++){
    var ev=f[i],ext=isE(ev.type),col=cCol(ev.category);
    var d=document.createElement("div");d.className="ei"+(selI===i?" sel":"");
    d.innerHTML='<div class="rw"><div class="dt '+(ext?"ext":"int")+'" style="background:'+col+'"></div><span class="nm">'+ev.name+'</span></div><div class="inf">'+ev.date.toLocaleDateString("en-GB",{day:"numeric",month:"short"})+' · '+ev.category+'</div>';
    d.onmouseenter=(function(idx){return function(){hovI=idx;rWheel(getF());};})(i);
    d.onmouseleave=function(){hovI=null;rWheel(getF());};
    d.onclick=(function(idx){return function(){selI=selI===idx?null:idx;render();};})(i);
    el.appendChild(d);
  }
}

function rWheel(f){
  var svg=document.getElementById("wsvg");
  var S=700,cx=350,cy=350,oR=310,iR=100;
  var rings=[170,205,240];
  var items=f.map(function(ev){return{date:ev.date,name:ev.name,category:ev.category,type:ev.type,description:ev.description,angle:d2a(ev.date)};}).sort(function(a,b){return a.angle-b.angle;});
  var placed=[];
  var pos=items.map(function(ev){
    var best=0;
    for(var ri=0;ri<rings.length;ri++){var ok=true;for(var j=0;j<placed.length;j++){if(placed[j].ring===ri&&Math.abs(placed[j].angle-ev.angle)<8){ok=false;break;}}if(ok){best=ri;break;}best=ri;}
    var r={date:ev.date,name:ev.name,category:ev.category,type:ev.type,description:ev.description,angle:ev.angle,radius:rings[best],ring:best};
    placed.push(r);return r;
  });

  var year=f.length>0?f[0].date.getFullYear():new Date().getFullYear();
  var h='<defs><filter id="gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/></filter><radialGradient id="cg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#e2e8f0"/></radialGradient></defs>';
  h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(oR+8)+'" fill="#f1f5f9"/><circle cx="'+cx+'" cy="'+cy+'" r="'+oR+'" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>';

  for(var i=0;i<12;i++){
    var sa=(i/12)*360-90,ea=((i+1)/12)*360-90,ma=(sa+ea)/2;
    var lp=pol(cx,cy,280,ma),s1=pol(cx,cy,iR,sa),e1=pol(cx,cy,oR,sa);
    h+='<line x1="'+s1.x+'" y1="'+s1.y+'" x2="'+e1.x+'" y2="'+e1.y+'" stroke="#cbd5e1" stroke-width="0.5"/>';
    if(i%2===0){var ie=pol(cx,cy,iR,ea);h+='<path d="'+arc(cx,cy,oR,sa,ea)+' L '+ie.x+' '+ie.y+' '+arc(cx,cy,iR,ea,sa).replace("M","L")+' Z" fill="#f8fafc" opacity="0.6"/>';}
    h+='<text x="'+lp.x+'" y="'+lp.y+'" text-anchor="middle" dominant-baseline="middle" style="font-size:11px;font-family:DM Sans,sans-serif;font-weight:600;fill:#64748b;letter-spacing:0.05em;text-transform:uppercase">'+MO[i]+'</text>';
  }

  h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+iR+'" fill="url(#cg)" stroke="#e2e8f0" stroke-width="1"/>';
  h+='<text x="'+cx+'" y="'+(cy-14)+'" text-anchor="middle" dominant-baseline="middle" style="font-size:22px;font-family:DM Sans,sans-serif;font-weight:700;fill:#1e293b">'+year+'</text>';
  h+='<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" dominant-baseline="middle" style="font-size:11px;font-family:DM Sans,sans-serif;fill:#94a3b8;letter-spacing:0.08em;text-transform:uppercase">Yearly Wheel</text>';
  h+='<text x="'+cx+'" y="'+(cy+28)+'" text-anchor="middle" dominant-baseline="middle" style="font-size:11px;font-family:DM Sans,sans-serif;fill:#94a3b8">'+f.length+' events</text>';

  for(var i=0;i<pos.length;i++){
    var ev=pos[i],p=pol(cx,cy,ev.radius,ev.angle),ls=pol(cx,cy,iR+4,ev.angle);
    var col=cCol(ev.category),act=hovI===i||selI===i,ds=act?7:5,ext=isE(ev.type);
    var flt=act?"url(#gl)":"url(#sh)";
    h+='<g data-i="'+i+'" class="ev" style="cursor:pointer">';
    h+='<line x1="'+ls.x+'" y1="'+ls.y+'" x2="'+p.x+'" y2="'+p.y+'" stroke="'+col+'" stroke-width="'+(act?1.5:0.5)+'" opacity="'+(act?0.6:0.2)+'"/>';
    h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="14" fill="transparent"/>';
    if(ext){h+='<polygon points="'+p.x+','+(p.y-ds)+' '+(p.x+ds*0.87)+','+(p.y+ds*0.5)+' '+(p.x-ds*0.87)+','+(p.y+ds*0.5)+'" fill="'+col+'" stroke="#fff" stroke-width="1.5" filter="'+flt+'"/>';}
    else{h+='<circle cx="'+p.x+'" cy="'+p.y+'" r="'+ds+'" fill="'+col+'" stroke="#fff" stroke-width="1.5" filter="'+flt+'"/>';}
    if(act){var tw=ev.name.length*6.5+16;h+='<rect x="'+(p.x+10)+'" y="'+(p.y-12)+'" width="'+tw+'" height="22" rx="4" fill="#1e293b" opacity="0.92"/><text x="'+(p.x+18)+'" y="'+(p.y+2)+'" style="font-size:11px;font-family:DM Sans,sans-serif;fill:#fff;font-weight:500">'+ev.name+'</text>';}
    h+='</g>';
  }
  svg.innerHTML=h;
  var dots=svg.querySelectorAll(".ev");
  for(var j=0;j<dots.length;j++){(function(g){var idx=parseInt(g.getAttribute("data-i"));g.addEventListener("mouseenter",function(){hovI=idx;rWheel(getF());});g.addEventListener("mouseleave",function(){hovI=null;rWheel(getF());});g.addEventListener("click",function(){selI=selI===idx?null:idx;render();});})(dots[j]);}
}

function resetF(){aCats=new Set(allCats);aTypes=new Set(["Internal","External"]);selI=null;render();}
function selA(){aCats=new Set(allCats);selI=null;render();}
function selN(){aCats=new Set();selI=null;render();}

/* ── Drag & drop ── */
document.addEventListener("dragover",function(e){e.preventDefault();document.getElementById("drop-ov").style.display="block";});
document.addEventListener("dragleave",function(e){if(!e.relatedTarget||e.relatedTarget===document.documentElement)document.getElementById("drop-ov").style.display="none";});
document.addEventListener("drop",function(e){e.preventDefault();document.getElementById("drop-ov").style.display="none";if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
document.getElementById("fi").addEventListener("change",function(e){if(e.target.files[0])handleFile(e.target.files[0]);});

/* ── Boot: try loading events.csv, fall back to sample ── */
document.getElementById("ld-s").textContent="Looking for "+CSV_FILE+"…";

var xhr=new XMLHttpRequest();
xhr.open("GET",CSV_FILE,true);
xhr.onreadystatechange=function(){
  if(xhr.readyState!==4)return;
  if(xhr.status>=200&&xhr.status<300&&xhr.responseText&&xhr.responseText.length>10){
    document.getElementById("ld-s").textContent="Parsing events…";
    try{
      var objs=parseCSV(xhr.responseText);
      var evts=parseRows(objs);
      if(evts.length>0){useSample=false;apply(evts);return;}
    }catch(e){}
  }
  // Fallback to sample
  document.getElementById("ld-s").textContent="No CSV found, loading sample data…";
  useSample=true;
  setTimeout(function(){apply(SAMPLE);},400);
};
xhr.onerror=function(){
  useSample=true;
  setTimeout(function(){apply(SAMPLE);},400);
};
xhr.send();
</script>
